<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Chess (Browser)</title>
    <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #101217;
        color: #f5f7ff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .header {
        padding: 14px 18px;
        border-bottom: 1px solid #2a3040;
        background: #161a22;
      }

      .header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }

      #display {
        width: 100%;
        height: calc(100vh - 56px);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>My Chess (Java Swing via CheerpJ)</h1>
      </header>
      <div id="status" style="padding: 10px 18px; border-bottom: 1px solid #2a3040">
        Starting Java runtime...
      </div>
      <main id="display"></main>
    </div>

    <script type="module">
      const statusEl = document.getElementById("status");

      try {
        statusEl.textContent = "Initializing CheerpJ runtime...";
        await cheerpjInit();
        cheerpjCreateDisplay(1100, 800, document.getElementById("display"));

        statusEl.textContent = "Launching Main.Main...";
        await cheerpjRunMain("Main.Main", "/app/mychessapp.jar");
        statusEl.textContent = "Game started.";
      } catch (error) {
        console.error("CheerpJ startup failed:", error);
        statusEl.textContent =
          "Startup failed. Open browser devtools console for details.";
      }
    </script>
  </body>
</html>
